<h2 mat-dialog-title>Confirmación</h2> 

<mat-dialog-content>
    <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end"> 
    <button mat-button (click)="onCancel()" cdkFocusInitial>Cancelar</button> 
    <button mat-button color="primary" (click)="onConfirm()">Confirmar</button> 
</mat-dialog-actions>
