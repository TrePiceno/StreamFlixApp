<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <main>
        <header>
            <img src="./public/images/logo.png" alt="Logo Streamflix">
        </header>
        <form id="form">
            <label for="usuario">Ingrese usuario</label>
            <input type="text" id="usuario" placeholder="admin">
            <label for="contraseña">Ingrese constraseña</label>
            <input type="password" id="contraseña" placeholder="pass123">
            <button type="submit">Iniciar sesión</button>
        </form>
    </main>
    <script src="./login.js"></script>
</body>
</html>
